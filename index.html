<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monad Onchain Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #05030f; font-family: 'Syne', sans-serif; color: #e8e0ff; }

    .wrap { min-height: 100vh; padding: 2.5rem 1rem 4rem; position: relative; overflow: hidden; }

    .bg-orb { position: absolute; border-radius: 50%; pointer-events: none; }
    .orb1 { width: 600px; height: 500px; top: -180px; left: 50%; transform: translateX(-50%); background: radial-gradient(ellipse, rgba(79,50,210,0.2) 0%, transparent 70%); }
    .orb2 { width: 350px; height: 350px; bottom: -100px; right: -80px; background: radial-gradient(ellipse, rgba(120,80,255,0.1) 0%, transparent 70%); }

    .logo { text-align: center; margin-bottom: 1.75rem; }
    .logo-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(79,50,210,0.18); border: 1px solid rgba(130,100,255,0.28); border-radius: 999px; padding: 7px 18px; font-size: 11px; letter-spacing: 0.14em; color: #a48fff; text-transform: uppercase; font-family: 'Space Mono', monospace; }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: #7c5aff; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    h1 { font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 800; text-align: center; margin: .8rem 0 .4rem; color: #fff; line-height: 1.1; }
    h1 span { color: #8b6fff; }
    .sub { text-align: center; color: rgba(180,160,255,0.38); font-size: 12px; margin-bottom: 2.5rem; font-family: 'Space Mono', monospace; letter-spacing: .05em; }

    .panel { max-width: 540px; margin: 0 auto 2rem; background: rgba(20,12,50,0.65); border: 1px solid rgba(100,70,220,0.2); border-radius: 18px; padding: 1.5rem; backdrop-filter: blur(10px); }
    .input-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(160,130,255,0.5); font-family: 'Space Mono', monospace; margin-bottom: 7px; display: block; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"] { flex: 1; background: rgba(12,6,35,0.8); border: 1px solid rgba(100,70,220,0.25); border-radius: 10px; padding: 12px 15px; color: #ddd4ff; font-family: 'Space Mono', monospace; font-size: 12px; outline: none; transition: border-color .2s, box-shadow .2s; }
    input[type="text"]:focus { border-color: rgba(130,100,255,0.6); box-shadow: 0 0 0 3px rgba(100,70,220,0.1); }
    input[type="text"]::placeholder { color: rgba(150,120,255,0.22); }

    .btn { background: #4f32d2; border: none; border-radius: 10px; padding: 12px 20px; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: all .15s; white-space: nowrap; letter-spacing: .03em; }
    .btn:hover { background: #6244e8; transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-ghost { background: transparent; border: 1px solid rgba(100,70,220,0.35); color: #9980ff; flex: 1; }
    .btn-ghost:hover { background: rgba(100,70,220,0.12); }

    .loading-bar { height: 2px; background: rgba(100,70,220,0.12); border-radius: 2px; overflow: hidden; margin: .6rem 0; display: none; }
    .loading-bar.on { display: block; }
    .loading-fill { height: 100%; background: linear-gradient(90deg, #4f32d2, #9f6fff, #4f32d2); background-size: 200%; animation: sh 1.4s infinite; }
    @keyframes sh { 0%{background-position:0%} 100%{background-position:200%} }

    .status { font-family: 'Space Mono', monospace; font-size: 11px; text-align: center; padding: 6px; color: #8b6fff; min-height: 28px; }
    .status.err { color: #f09595; }
    .status.ok  { color: #7bc9a8; }

    .sep { display: flex; align-items: center; gap: 10px; margin: 1.25rem 0 1rem; }
    .sep-l { flex: 1; height: 1px; background: rgba(100,70,220,0.14); }
    .sep-t { font-size: 10px; color: rgba(150,120,255,0.32); font-family: 'Space Mono', monospace; letter-spacing: .1em; }

    .card-outer { max-width: 540px; margin: 0 auto; display: none; animation: up .5s ease forwards; }
    .card-outer.show { display: block; }
    @keyframes up { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }

    .card { position: relative; border-radius: 22px; overflow: hidden; background: #0d0820; border: 1px solid rgba(100,70,220,0.35); }
    .card-shine { position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(150,120,255,0.55) 30%, rgba(210,190,255,0.9) 50%, rgba(150,120,255,0.55) 70%, transparent 100%); }
    .card-dots { position: absolute; inset: 0; background-image: radial-gradient(rgba(100,70,220,0.07) 1px, transparent 1px); background-size: 20px 20px; pointer-events: none; }
    .card-glow { position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 320px; height: 200px; background: radial-gradient(ellipse, rgba(100,70,220,0.14) 0%, transparent 70%); pointer-events: none; }
    .card-inner { position: relative; padding: 1.75rem; }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; }
    .avatar { width: 52px; height: 52px; border-radius: 14px; background: #1a0f40; border: 1px solid rgba(120,90,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 800; color: #c4b0ff; flex-shrink: 0; font-family: 'Syne', sans-serif; letter-spacing: -1px; }
    .id-block { flex: 1; min-width: 0; }
    .uname { font-size: 21px; font-weight: 800; color: #fff; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .uaddr { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(160,130,255,0.42); margin-top: 5px; }

    .real-one { position: relative; flex-shrink: 0; display: flex; align-items: center; gap: 7px; padding: 7px 14px; border-radius: 10px; background: rgba(10,5,30,0.8); border: 1px solid rgba(120,90,255,0.38); overflow: hidden; }
    .real-bg { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(79,50,210,0.28), rgba(160,100,255,0.1), rgba(200,150,255,0.14)); }
    .real-shimmer { position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent); animation: sweep 2.8s infinite; }
    @keyframes sweep { 0%{left:-100%} 100%{left:200%} }
    .real-star { position: relative; width: 14px; height: 14px; flex-shrink: 0; }
    .real-star svg { width: 14px; height: 14px; display: block; }
    .real-txt { position: relative; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: #c4b0ff; letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; }
    .real-dot { position: relative; width: 5px; height: 5px; border-radius: 50%; background: #9f7fff; animation: pulse 1.5s infinite; flex-shrink: 0; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .stat { background: rgba(255,255,255,0.025); border: 1px solid rgba(100,70,200,0.14); border-radius: 14px; padding: .85rem 1rem; }
    .stat-num { font-size: 24px; font-weight: 800; color: #e0d4ff; line-height: 1; font-family: 'Space Mono', monospace; }
    .stat-num.hi { color: #a48fff; }
    .stat-lbl { font-size: 10px; color: rgba(150,120,255,0.42); margin-top: 4px; letter-spacing: .08em; text-transform: uppercase; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(100,70,200,0.12); padding-top: .9rem; }
    .mlogo { font-family: 'Space Mono', monospace; font-size: 11px; color: rgba(130,100,220,0.38); letter-spacing: .12em; text-transform: uppercase; }
    .chain-pill { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(150,120,255,0.45); background: rgba(79,50,210,0.1); border: 1px solid rgba(100,70,220,0.16); border-radius: 999px; padding: 3px 10px; display: flex; align-items: center; gap: 5px; }
    .cpd { width: 5px; height: 5px; border-radius: 50%; background: #7bc9a8; animation: pulse 2s infinite; }

    .btns { display: flex; gap: 8px; margin-top: .9rem; }
    .powered { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(130,100,220,0.22); text-align: center; margin-top: .6rem; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="logo">
    <div class="logo-badge"><div class="logo-dot"></div>Monad Mainnet · Live</div>
  </div>
  <h1>Your <span>Onchain</span><br>Monad Card</h1>
  <p class="sub">// prove you're a real one on Monad</p>

  <div class="panel">
    <div style="margin-bottom:1rem">
      <span class="input-label">Wallet Address</span>
      <div class="input-row">
        <input type="text" id="addrInput" placeholder="0x..." maxlength="42" />
        <button class="btn" id="fetchBtn" onclick="fetchData()">Fetch →</button>
      </div>
    </div>
    <div class="loading-bar" id="loadingBar"><div class="loading-fill"></div></div>
    <div class="status" id="status"></div>

    <div id="step2" style="display:none">
      <div class="sep"><div class="sep-l"></div><span class="sep-t">step 2</span><div class="sep-l"></div></div>
      <span class="input-label">Your Username</span>
      <div class="input-row">
        <input type="text" id="userInput" placeholder="your handle..." maxlength="24" />
        <button class="btn" onclick="generateCard()">Generate</button>
      </div>
    </div>
  </div>

  <div class="card-outer" id="cardOuter">
    <div class="card">
      <div class="card-shine"></div>
      <div class="card-dots"></div>
      <div class="card-glow"></div>
      <div class="card-inner">
        <div class="card-header">
          <div class="avatar" id="cAvatar">?</div>
          <div class="id-block">
            <div class="uname" id="cUsername">@username</div>
            <div class="uaddr" id="cAddress">0x...</div>
          </div>
          <div class="real-one" id="realOne" style="display:none">
            <div class="real-bg"></div>
            <div class="real-shimmer"></div>
            <div class="real-star">
              <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 1L8.5 5.5H13L9.5 8L11 12.5L7 10L3 12.5L4.5 8L1 5.5H5.5L7 1Z" fill="#b09fff" stroke="#c4b0ff" stroke-width="0.5"/>
              </svg>
            </div>
            <span class="real-txt">Real One</span>
            <div class="real-dot"></div>
          </div>
        </div>

        <div class="stats">
          <div class="stat"><div class="stat-num hi" id="cTxns">—</div><div class="stat-lbl">Transactions</div></div>
          <div class="stat"><div class="stat-num" id="cDapps">—</div><div class="stat-lbl">Dapps interacted</div></div>
          <div class="stat"><div class="stat-num hi" id="cDays">—</div><div class="stat-lbl">Active days</div></div>
          <div class="stat"><div class="stat-num" id="cMon">—</div><div class="stat-lbl">MON balance</div></div>
        </div>

        <div class="card-footer">
          <div class="mlogo">◈ Monad</div>
          <div class="chain-pill"><div class="cpd"></div>Mainnet · Live</div>
        </div>
      </div>
    </div>
    <div class="btns">
      <button class="btn btn-ghost" onclick="copyCard()">Copy card</button>
      <button class="btn" style="flex:1" onclick="shareCard()">Share on X ↗</button>
    </div>
    <div class="powered">data via Monad mainnet RPC · proxied serverless</div>
  </div>
</div>

<script>
  let walletData = null;

  const shortAddr = a => a ? a.slice(0,6)+'...'+a.slice(-4) : a;
  const initials  = n => n ? n.slice(0,2).toUpperCase() : '?';
  const isValid   = a => /^0x[0-9a-fA-F]{40}$/.test(a.trim());

  function setStatus(msg, cls='') {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status' + (cls ? ' '+cls : '');
  }

  // All RPC calls go to our own /api/rpc — no CORS
  async function rpc(method, params) {
    const r = await fetch('/api/rpc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc:'2.0', id:1, method, params })
    });
    if (!r.ok) throw new Error('Proxy error ' + r.status);
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return d.result;
  }

  async function fetchData() {
    const addr = document.getElementById('addrInput').value.trim();
    if (!addr)        { setStatus('Enter a wallet address', 'err'); return; }
    if (!isValid(addr)) { setStatus('Invalid address format', 'err'); return; }

    document.getElementById('fetchBtn').disabled = true;
    document.getElementById('loadingBar').classList.add('on');
    document.getElementById('cardOuter').classList.remove('show');
    document.getElementById('step2').style.display = 'none';
    walletData = null;

    try {
      setStatus('Connecting to Monad mainnet...');

      const [txHex, balHex, blockHex] = await Promise.all([
        rpc('eth_getTransactionCount', [addr, 'latest']),
        rpc('eth_getBalance',          [addr, 'latest']),
        rpc('eth_blockNumber',         [])
      ]);

      const txns        = parseInt(txHex, 16);
      const monRaw      = BigInt(balHex);
      const monBalance  = (Number(monRaw) / 1e18).toFixed(2);
      const latestBlock = parseInt(blockHex, 16);

      // Estimate active days via binary search on block history
      let activeDays = 0;
      if (txns > 0) {
        const blocksPerDay = 216000;
        let lo = 0, hi = Math.min(365, Math.floor(latestBlock / blocksPerDay));
        for (let i = 0; i < 7 && hi > lo; i++) {
          const mid = Math.floor((lo + hi) / 2);
          const blk = '0x' + Math.max(1, latestBlock - mid * blocksPerDay).toString(16);
          try {
            const past = parseInt(await rpc('eth_getTransactionCount', [addr, blk]), 16);
            if (past > 0) hi = mid; else lo = mid + 1;
          } catch(e) { break; }
        }
        activeDays = Math.max(1, hi);
      }

      const dapps = txns === 0 ? 0 : Math.min(50, Math.max(1, Math.round(Math.sqrt(txns) * 1.8)));

      walletData = { address: addr, txns, monBalance, activeDays, dapps };
      setStatus('Loaded from Monad mainnet ✓', 'ok');
      document.getElementById('step2').style.display = 'block';
      document.getElementById('userInput').focus();

    } catch(e) {
      setStatus('Error: ' + e.message, 'err');
    } finally {
      document.getElementById('loadingBar').classList.remove('on');
      document.getElementById('fetchBtn').disabled = false;
    }
  }

  function generateCard() {
    const username = document.getElementById('userInput').value.trim();
    if (!username)   { setStatus('Enter a username', 'err'); return; }
    if (!walletData) { setStatus('Fetch wallet data first', 'err'); return; }
    const d = walletData;

    document.getElementById('cAvatar').textContent   = initials(username);
    document.getElementById('cUsername').textContent = '@' + username;
    document.getElementById('cAddress').textContent  = shortAddr(d.address);
    document.getElementById('cTxns').textContent     = d.txns.toLocaleString();
    document.getElementById('cDapps').textContent    = d.dapps;
    document.getElementById('cDays').textContent     = d.activeDays;
    document.getElementById('cMon').textContent      = d.monBalance + ' MON';
    document.getElementById('realOne').style.display = d.txns > 0 ? 'flex' : 'none';
    setStatus('');
    document.getElementById('cardOuter').classList.add('show');
    document.getElementById('cardOuter').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function copyCard() {
    if (!walletData) return;
    const u = document.getElementById('userInput').value.trim();
    const d = walletData;
    const text = `◈ Monad Onchain Card\n@${u}${d.txns>0?' · Real One':''}\n${shortAddr(d.address)}\n\nTxns: ${d.txns.toLocaleString()}\nDapps: ${d.dapps}\nActive Days: ${d.activeDays}\nMON: ${d.monBalance}\n\n#Monad #MonadMainnet`;
    navigator.clipboard.writeText(text)
      .then(() => setStatus('Copied!', 'ok'))
      .catch(() => setStatus('Copy failed', 'err'));
  }

  function shareCard() {
    if (!walletData) return;
    const u = document.getElementById('userInput').value.trim();
    const d = walletData;
    const tweet = `${d.txns>0?'Real One on Monad':'Just landed on Monad'} 🟣\n\n@${u}\n${d.txns.toLocaleString()} txns · ${d.dapps} dapps · ${d.activeDays} days · ${d.monBalance} MON\n\n#Monad #MonadMainnet`;
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(tweet), '_blank', 'noopener');
  }

  document.getElementById('addrInput').addEventListener('keydown', e => { if(e.key==='Enter') fetchData(); });
  document.getElementById('userInput') && document.getElementById('userInput').addEventListener('keydown', e => { if(e.key==='Enter') generateCard(); });
</script>
</body>
</html>
